name: Release Publisher

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

env:
  RELEASE_VERSION: ${{ github.ref_name }}
  DASK_VERSION_TO_WAIT_FOR: ${{ github.ref_name }}

jobs:
  build_pypi:
    name: Build PyPI distributions
    if: github.repository == 'dask/distributed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Check release versions and dependency bounds
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Release versions must use x.x.x form, got $RELEASE_VERSION"
              exit 1
          fi
          if [[ ! "$DASK_VERSION_TO_WAIT_FOR" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Dask versions must use x.x.x form, got $DASK_VERSION_TO_WAIT_FOR"
              exit 1
          fi
          major_minor="${DASK_VERSION_TO_WAIT_FOR%.*}"
          patch="${DASK_VERSION_TO_WAIT_FOR##*.}"
          next_dask_patch_version="${major_minor}.$((10#$patch + 1))"
          if ! grep -Eq "dask[[:space:]]*>=[[:space:]]*${DASK_VERSION_TO_WAIT_FOR},[[:space:]]*<${next_dask_patch_version}" pyproject.toml; then
              echo "::error::pyproject.toml must pin dask >=${DASK_VERSION_TO_WAIT_FOR},<${next_dask_patch_version}"
              exit 1
          fi
      - name: Build distributions
        run: uv build --sdist --wheel
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  wait_for_dask_pypi:
    name: Wait for matching Dask release on PyPI
    needs: build_pypi
    if: github.repository == 'dask/distributed'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Wait for matching Dask release
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          version = os.environ["DASK_VERSION_TO_WAIT_FOR"]
          url = f"https://pypi.org/pypi/dask/{version}/json"
          deadline = time.monotonic() + 115 * 60

          while True:
              try:
                  with urllib.request.urlopen(url, timeout=15) as response:
                      data = json.load(response)
                  package_types = {file.get("packagetype") for file in data.get("urls", [])}
                  missing_package_types = {"bdist_wheel", "sdist"} - package_types
                  if not missing_package_types:
                      print(f"dask=={version} wheel and sdist are available on PyPI")
                      break
                  print(
                      f"dask=={version} exists on PyPI but is missing "
                      f"{', '.join(sorted(missing_package_types))}"
                  )
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      print(f"dask=={version} is not available on PyPI yet")
                  else:
                      print(f"PyPI returned HTTP {exc.code}: {exc.reason}")
              except Exception as exc:
                  print(f"Could not query PyPI: {exc}")

              if time.monotonic() >= deadline:
                  raise SystemExit(f"Timed out waiting for dask=={version} on PyPI")
              time.sleep(60)
          PY

  smoke_test_pypi:
    name: Smoke-test distributions on Python ${{ matrix.python-version }}
    needs: wait_for_dask_pypi
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - run: uv venv --python ${{ matrix.python-version }} .venv
      - run: uv pip install --python .venv/bin/python dist/*.whl
      - run: |
          .venv/bin/python - <<'PY'
          import importlib.metadata
          import os

          import dask
          import distributed
          from distributed import Client

          expected_version = os.environ["RELEASE_VERSION"]
          expected_dask_version = os.environ["DASK_VERSION_TO_WAIT_FOR"]
          if distributed.__version__ != expected_version:
              raise SystemExit(
                  f"Expected distributed.__version__ {expected_version}, got {distributed.__version__}"
              )
          installed_version = importlib.metadata.version("distributed")
          if installed_version != expected_version:
              raise SystemExit(f"Expected installed distributed {expected_version}, got {installed_version}")
          if dask.__version__ != expected_dask_version:
              raise SystemExit(f"Expected dask=={expected_dask_version}, got {dask.__version__}")
          installed_dask_version = importlib.metadata.version("dask")
          if installed_dask_version != expected_dask_version:
              raise SystemExit(f"Expected installed dask {expected_dask_version}, got {installed_dask_version}")

          with Client(processes=False, n_workers=1, threads_per_worker=1, dashboard_address=None) as client:
              assert client.submit(lambda x: x + 1, 1).result() == 2
          PY
      - run: uv venv --python ${{ matrix.python-version }} .venv-sdist
      - run: uv pip install --python .venv-sdist/bin/python dist/*.tar.gz
      - run: |
          .venv-sdist/bin/python - <<'PY'
          import importlib.metadata
          import os

          import dask
          import distributed
          from distributed import Client

          expected_version = os.environ["RELEASE_VERSION"]
          expected_dask_version = os.environ["DASK_VERSION_TO_WAIT_FOR"]
          if distributed.__version__ != expected_version:
              raise SystemExit(
                  f"Expected distributed.__version__ {expected_version}, got {distributed.__version__}"
              )
          installed_version = importlib.metadata.version("distributed")
          if installed_version != expected_version:
              raise SystemExit(f"Expected installed distributed {expected_version}, got {installed_version}")
          if dask.__version__ != expected_dask_version:
              raise SystemExit(f"Expected dask=={expected_dask_version}, got {dask.__version__}")
          installed_dask_version = importlib.metadata.version("dask")
          if installed_dask_version != expected_dask_version:
              raise SystemExit(f"Expected installed dask {expected_dask_version}, got {installed_dask_version}")

          with Client(processes=False, n_workers=1, threads_per_worker=1, dashboard_address=None) as client:
              assert client.submit(lambda x: x + 1, 1).result() == 2
          PY

  publish_pypi:
    name: Publish PyPI distributions
    needs: smoke_test_pypi
    if: github.repository == 'dask/distributed'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/distributed/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish_release:
    needs: publish_pypi
    if: github.repository == 'dask/distributed'
    permissions:
      # Write permission is required to publish a GitHub release
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Set version env
        # Use a little bit of bash to extract the tag name from the GitHub ref
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - uses: release-drafter/release-drafter@v7
        with:
          # Override the Release name/tag/version with the actual tag name
          name: ${{ env.RELEASE_VERSION }}
          tag: ${{ env.RELEASE_VERSION }}
          version: ${{ env.RELEASE_VERSION }}
          commitish: ${{ github.sha }}
          # Publish the Release
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
