name: Release Publisher

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Distributed release version to rehearse, in x.x.x form"
        required: true
        type: string
      dask_version:
        description: "Dask version on PyPI to wait for"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
  DASK_VERSION_TO_WAIT_FOR: ${{ github.event.inputs.dask_version || github.ref_name }}

jobs:
  build_pypi:
    name: Build PyPI distributions
    if: github.repository == 'dask/distributed' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Check release versions
        run: |
          release_version="$RELEASE_VERSION"
          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Release versions must use x.x.x form, got $release_version"
              exit 1
          fi
          dask_version="$DASK_VERSION_TO_WAIT_FOR"
          if [[ ! "$dask_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Dask versions must use x.x.x form, got $dask_version"
              exit 1
          fi
      - name: Build distributions
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
              export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DISTRIBUTED="$RELEASE_VERSION"
          fi
          uv build --sdist --wheel
      - name: Check built versions
        run: |
          python - <<'PY'
          import email
          import glob
          import os
          import tarfile
          import zipfile

          release_version = os.environ["RELEASE_VERSION"]
          dask_version = os.environ["DASK_VERSION_TO_WAIT_FOR"]
          major, minor, patch = dask_version.split(".")
          next_dask_patch_version = f"{major}.{minor}.{int(patch) + 1}"

          wheel_paths = glob.glob("dist/*.whl")
          sdist_paths = glob.glob("dist/*.tar.gz")
          if len(wheel_paths) != 1 or len(sdist_paths) != 1:
              raise SystemExit("Expected exactly one wheel and one sdist")

          with zipfile.ZipFile(wheel_paths[0]) as wheel:
              metadata_path = next(name for name in wheel.namelist() if name.endswith(".dist-info/METADATA"))
              wheel_metadata = email.message_from_bytes(wheel.read(metadata_path))
              wheel_version = wheel_metadata["Version"]

          with tarfile.open(sdist_paths[0], "r:gz") as sdist:
              pkg_info_path = next(name for name in sdist.getnames() if name.endswith("/PKG-INFO"))
              pkg_info = sdist.extractfile(pkg_info_path)
              if pkg_info is None:
                  raise SystemExit("Could not read sdist PKG-INFO")
              sdist_metadata = email.message_from_binary_file(pkg_info)
              sdist_version = sdist_metadata["Version"]

          for artifact, version in {"wheel": wheel_version, "sdist": sdist_version}.items():
              if version != release_version:
                  raise SystemExit(f"{artifact} version {version} does not match release {release_version}")

          for artifact, metadata in {"wheel": wheel_metadata, "sdist": sdist_metadata}.items():
              requirements = metadata.get_all("Requires-Dist") or []
              dask_requirements = [
                  requirement
                  for requirement in requirements
                  if requirement.startswith("dask")
              ]
              if len(dask_requirements) != 1:
                  raise SystemExit(
                      f"{artifact} should declare exactly one dask requirement, got {dask_requirements}"
                  )
              requirement = dask_requirements[0].replace(" ", "")
              if f">={dask_version}" not in requirement or f"<{next_dask_patch_version}" not in requirement:
                  raise SystemExit(
                      f"{artifact} should require dask>={dask_version},<{next_dask_patch_version}, "
                      f"got {dask_requirements[0]}"
                  )
          PY
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  wait_for_dask_pypi:
    name: Wait for matching Dask release on PyPI
    needs: build_pypi
    if: github.repository == 'dask/distributed' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Wait for matching Dask release
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          version = os.environ["DASK_VERSION_TO_WAIT_FOR"]
          url = f"https://pypi.org/pypi/dask/{version}/json"
          deadline = time.monotonic() + 115 * 60

          while True:
              try:
                  with urllib.request.urlopen(url, timeout=15) as response:
                      data = json.load(response)
                  package_types = {file.get("packagetype") for file in data.get("urls", [])}
                  missing_package_types = {"bdist_wheel", "sdist"} - package_types
                  if not missing_package_types:
                      print(f"dask=={version} wheel and sdist are available on PyPI")
                      break
                  print(
                      f"dask=={version} exists on PyPI but is missing "
                      f"{', '.join(sorted(missing_package_types))}"
                  )
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      print(f"dask=={version} is not available on PyPI yet")
                  else:
                      print(f"PyPI returned HTTP {exc.code}: {exc.reason}")
              except Exception as exc:
                  print(f"Could not query PyPI: {exc}")

              if time.monotonic() >= deadline:
                  raise SystemExit(f"Timed out waiting for dask=={version} on PyPI")
              time.sleep(60)
          PY

  smoke_test_pypi:
    name: Smoke-test distributions on Python ${{ matrix.python-version }}
    needs: wait_for_dask_pypi
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - run: uv venv --python ${{ matrix.python-version }} .venv
      - run: uv pip install --python .venv/bin/python dist/*.whl
      - run: |
          .venv/bin/python - <<'PY'
          import os

          import dask
          from distributed import Client

          expected_dask_version = os.environ["DASK_VERSION_TO_WAIT_FOR"]
          if dask.__version__ != expected_dask_version:
              raise SystemExit(f"Expected dask=={expected_dask_version}, got {dask.__version__}")

          with Client(processes=False, n_workers=1, threads_per_worker=1, dashboard_address=None) as client:
              assert client.submit(lambda x: x + 1, 1).result() == 2
          PY
      - run: uv venv --python ${{ matrix.python-version }} .venv-sdist
      - run: uv pip install --python .venv-sdist/bin/python dist/*.tar.gz
      - run: |
          .venv-sdist/bin/python - <<'PY'
          import os

          import dask
          from distributed import Client

          expected_dask_version = os.environ["DASK_VERSION_TO_WAIT_FOR"]
          if dask.__version__ != expected_dask_version:
              raise SystemExit(f"Expected dask=={expected_dask_version}, got {dask.__version__}")

          with Client(processes=False, n_workers=1, threads_per_worker=1, dashboard_address=None) as client:
              assert client.submit(lambda x: x + 1, 1).result() == 2
          PY

  dry_run_publish_pypi:
    name: Dry-run PyPI publish
    needs: smoke_test_pypi
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - name: Confirm publish skipped
        run: |
          ls -l dist
          echo "Dry run only; not publishing distributed==$RELEASE_VERSION to PyPI."

  publish_pypi:
    name: Publish PyPI distributions
    needs: smoke_test_pypi
    if: github.repository == 'dask/distributed' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/distributed/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish_release:
    needs: publish_pypi
    if: github.repository == 'dask/distributed' && github.event_name != 'workflow_dispatch'
    permissions:
      # Write permission is required to publish a GitHub release
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Set version env
        # Use a little bit of bash to extract the tag name from the GitHub ref
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - uses: release-drafter/release-drafter@v7
        with:
          disable-autolabeler: true
          # Override the Release name/tag/version with the actual tag name
          name: ${{ env.RELEASE_VERSION }}
          tag: ${{ env.RELEASE_VERSION }}
          version: ${{ env.RELEASE_VERSION }}
          # Publish the Release
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
